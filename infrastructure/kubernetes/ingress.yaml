apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shaj-ingress
  namespace: shaj-ecom
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  tls:
    - hosts:
        - api.shaj.com
        - admin.shaj.com
        - shaj.com
        - www.shaj.com
        - pos.shaj.com
      secretName: shaj-tls
  rules:
    - host: api.shaj.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: shaj-api-service
                port:
                  number: 4000
    - host: admin.shaj.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: shaj-admin-service
                port:
                  number: 3001
    - host: pos.shaj.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: shaj-pos-service
                port:
                  number: 3002
    - host: shaj.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: shaj-web-service
                port:
                  number: 3000
