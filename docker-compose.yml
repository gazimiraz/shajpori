version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: shaj-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: shaj_ecom
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shaj-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: shaj-redis
    restart: unless-stopped
    command: redis-server --requirepass redis123 --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "redis123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shaj-network

  # NestJS API
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: shaj-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/shaj_ecom
      REDIS_URL: redis://:redis123@redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-change-in-production}
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your-refresh-secret}
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:3002
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    networks:
      - shaj-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Next.js Admin Dashboard
  admin:
    build:
      context: .
      dockerfile: docker/Dockerfile.admin
    container_name: shaj-admin
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    ports:
      - "3001:3001"
    depends_on:
      - api
    networks:
      - shaj-network

  # Next.js Customer Storefront
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: shaj-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - shaj-network

  # Next.js POS
  pos:
    build:
      context: .
      dockerfile: docker/Dockerfile.pos
    container_name: shaj-pos
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    ports:
      - "3002:3002"
    depends_on:
      - api
    networks:
      - shaj-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: shaj-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      - api
      - admin
      - web
      - pos
    networks:
      - shaj-network

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  certbot_data:
  certbot_www:

networks:
  shaj-network:
    driver: bridge
